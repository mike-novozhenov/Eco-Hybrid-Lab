[pytest]
# Настройки запуска: отчеты Allure и режим записи трейсов Playwright
addopts = --alluredir=allure-results --screenshot=only-on-failure
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Register custom markers to avoid warnings and provide help text
markers =
    ui: UI functional tests for the frontend
    api: Backend API integration tests
    smoke: Critical path tests for sanity checks
    hybrid: Combined UI and API scenarios